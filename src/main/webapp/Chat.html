<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
        }

        .chat-box {
            height: 400px;
            overflow-y: auto;
            background: white;
            border-radius: 12px;
            padding: 15px;
        }

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .sent {
            background: #0d6efd;
            color: white;
            margin-left: auto;
        }

        .received {
            background: #e9ecef;
        }
    </style>
</head>

<body class="p-4">

    <div class="container">

        <!-- TITLE -->
        <h4 id="chatTitle" class="mb-3">Chat</h4>

        <!-- CHAT BOX -->
        <div id="chatBox" class="chat-box mb-3"></div>

        <!-- INPUT -->
        <div class="d-flex">
            <input id="messageInput" type="text" class="form-control me-2" placeholder="Type a message...">
            <button onclick="sendMessage()" class="btn btn-primary">Send</button>
        </div>

    </div>

    <script src="js/chat.js"></script>

</body>
</html>
