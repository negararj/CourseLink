<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manage Courses — CourseLink</title>
    <link rel="icon" href="Images/web-icon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/home.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg app-navbar sticky-top bg-white">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" href="Home.html">
                <img src="Images/web-logo.png" alt="CourseLink" width="38" height="34" class="me-2">
                <span class="fw-bold">CourseLink</span>
            </a>
            <div class="ms-auto d-flex align-items-center">
                <span class="me-3 text-muted d-none d-md-block">Welcome, Dr. Smith</span>
                <a href="Profile.html" class="user-avatar text-decoration-none">DS</a>
            </div>
        </div>
    </nav>

    <div class="app-container">
        <aside class="app-sidebar">
            <nav class="nav flex-column">
                <a class="nav-link" href="Home.html">Home</a>
                <a class="nav-link" href="InstructorDashboard.html">Dashboard</a>
                <a class="nav-link active" href="InstructorCourses.html">Manage Courses</a>
                <a class="nav-link" href="InstructorSyllabus.html">Edit Syllabus</a>
                <a class="nav-link" href="InstructorMaterials.html">Upload Materials</a>
                <a class="nav-link" href="InstructorCalendar.html">Exam Calendar</a>
            </nav>
        </aside>

        <main class="app-main">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="page-title mb-0">Manage My Courses</h2>
                <button class="btn btn-primary rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#addCourseModal">+ Create New Course</button>
            </div>

            <div class="row g-4" id="instructor-courses-grid">
                <!-- Populated by JS -->
            </div>
        </main>
    </div>

    <!-- Modal for adding course -->
    <div class="modal fade" id="addCourseModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold">Create New Course</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="instructorAddCourseForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Course Name</label>
                            <input type="text" class="form-control" id="newCourseName" placeholder="e.g. Advanced AI" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Course Code</label>
                            <input type="text" class="form-control" id="newCourseCode" placeholder="e.g. CS401" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mt-2 py-2">Create Course</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const myCourses = [
            { title: "Intro to Programming", code: "CMP120", students: 85, color: "one" },
            { title: "Calculus II", code: "MTH104", students: 57, color: "two" }
        ];

        function renderCourses() {
            const grid = document.getElementById('instructor-courses-grid');
            grid.innerHTML = '';
            myCourses.forEach(course => {
                grid.innerHTML += `
                    <div class="col-md-6 col-xl-4">
                        <div class="feature-card p-4 h-100 d-flex flex-column">
                            <div class="feature-icon ${course.color} mb-3" style="width:45px; height:45px; font-size:1.2rem;">📚</div>
                            <h5 class="fw-bold mb-1">${course.title}</h5>
                            <p class="text-muted small mb-3">${course.code}</p>
                            <div class="mt-auto">
                                <p class="small text-muted mb-2">👥 ${course.students} Students Enrolled</p>
                                <div class="d-flex gap-2">
                                    <a href="InstructorSyllabus.html?course=${course.code}" class="btn btn-sm btn-outline-primary flex-grow-1">Syllabus</a>
                                    <a href="InstructorMaterials.html?course=${course.code}" class="btn btn-sm btn-outline-primary flex-grow-1">Materials</a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById('instructorAddCourseForm').addEventListener('submit', function(e) {
            e.preventDefault();
            myCourses.push({
                title: document.getElementById('newCourseName').value,
                code: document.getElementById('newCourseCode').value,
                students: 0,
                color: 'three'
            });
            renderCourses();
            bootstrap.Modal.getInstance(document.getElementById('addCourseModal')).hide();
            this.reset();
        });

        renderCourses();
    </script>
    <script src="js/current_user.js"></script>
</body>
</html>
