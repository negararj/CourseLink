<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Upload Materials — CourseLink</title>
    <link rel="icon" href="Images/web-icon.png" type="image/png">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="css/home.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">
    <link href="css/materials.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg app-navbar sticky-top bg-white">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" href="Home.html">
                <img src="Images/web-logo.png" alt="CourseLink" width="38" height="34" class="me-2">
                <span class="fw-bold">CourseLink</span>
            </a>
            <div class="ms-auto d-flex align-items-center">
                <span class="me-3 text-muted d-none d-md-block small">Dr. Smith (Instructor)</span>
                <div class="user-avatar">DS</div>
            </div>
        </div>
    </nav>

    <div class="app-container">
        <aside class="app-sidebar">
            <nav class="nav flex-column">
                <a class="nav-link" href="Home.html">Home</a>
                <a class="nav-link" href="InstructorDashboard.html">Dashboard</a>
                <a class="nav-link" href="InstructorCourses.html">Manage Courses</a>
                <a class="nav-link" href="InstructorSyllabus.html">Edit Syllabus</a>
                <a class="nav-link active" href="InstructorMaterials.html">Upload Materials</a>
                <a class="nav-link" href="InstructorCalendar.html">Exam Calendar</a>
            </nav>
        </aside>

        <main class="app-main">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold mb-0">Course Materials</h2>
                    <p class="text-muted small">Upload notes, past papers, and resources for your students.</p>
                </div>
                <button class="btn btn-primary rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#uploadMaterialModal">
                    + Upload New File
                </button>
            </div>

            <div class="card p-4 mb-4 shadow-sm border-0">
                <div class="row align-items-center">
                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-muted">Select Course to Manage</label>
                        <select class="form-select" id="courseSelect">
                            <option value="CMP120">Intro to Programming (CMP120)</option>
                            <option value="MTH104">Calculus II (MTH104)</option>
                        </select>
                    </div>
                </div>
            </div>

            <h5 class="fw-bold mb-3">Live on Student Portal</h5>
            <div class="row g-4" id="materials-grid">
                </div>
        </main>
    </div>

    <div class="modal fade" id="uploadMaterialModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold">Upload New Material</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="instructorUploadForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Document Title</label>
                            <input type="text" class="form-control" id="materialTitle" placeholder="e.g. Chapter 1 Summary" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Category</label>
                            <select class="form-select" id="materialType">
                                <option>Lecture Notes</option>
                                <option>Past Paper</option>
                                <option>Quiz Solution</option>
                                <option>External Reference</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">File Selection</label>
                            <input type="file" class="form-control" id="fileInput" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mt-2 py-2">Publish to Students</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script> <script src="js/instructor.js"></script> </body>
</html>
