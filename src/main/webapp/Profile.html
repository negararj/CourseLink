        <!-- SIDEBAR -->
        <!-- <aside class="app-sidebar">
            <nav class="nav flex-column">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="StudentDashboard.html">Dashboard</a>

        <!-- MAIN -->
        <main class="app-main p-4">

            <h2 class="mb-4">My Profile</h2>

            <!-- PERSONAL INFO -->
            <div class="card profile-card p-4 mb-4">
                <h5 class="mb-3">Personal Information</h5>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Name</label>
                        <input type="text" class="form-control" id="profileName" value="Loading..." readonly>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Email</label>
                        <input type="email" class="form-control" id="profileEmail" value="Loading..." readonly>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Major</label>
                        <input type="text" class="form-control" id="profileMajor" value="Loading..." readonly>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Role</label>
                        <input type="text" class="form-control" id="profileRole" value="Loading..." readonly>
                    </div>
                </div>

                <p class="small text-muted mb-0">Profile information is loaded from your CourseLink account.</p>
            </div>

            <!-- ENROLLED COURSES -->
            <div class="card profile-card p-4 mb-4">
                <h5 class="mb-3">Enrolled Courses</h5>

                <ul class="list-group" id="profileCourses">
                    <li class="list-group-item text-muted">Loading enrolled courses...</li>
                </ul>
            </div>

            <!-- CHANGE PASSWORD -->
            <div class="card profile-card p-4">
                <h5 class="mb-3">Change Password</h5>

                <div id="passwordMessage" class="alert d-none" role="alert"></div>

                <form id="passwordForm">
                    <div class="mb-3">
                        <label for="currentPassword">Current Password</label>
                        <input type="password" class="form-control" id="currentPassword" name="currentPassword" required>
                    </div>

                    <div class="mb-3">
                        <label for="newPassword">New Password</label>
                        <input type="password" class="form-control" id="newPassword" name="newPassword" minlength="6" required>
                    </div>

                    <div class="mb-3">
                        <label for="confirmPassword">Confirm New Password</label>
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" minlength="6" required>
                    </div>

                    <button type="submit" class="btn btn-danger" id="passwordSubmit">Update Password</button>
                </form>
            </div>

        </main>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
