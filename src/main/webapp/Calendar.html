<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Calendar — CourseLink</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts + Bootstrap -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>

    <!-- Your CSS -->
    <link href="css/home.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg app-navbar sticky-top bg-white">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="Images/web-logo.png" alt="CourseLink" width="38" height="34" class="me-2">
                <span class="fw-bold">CourseLink</span>
            </a>
            <div class="ms-auto d-flex align-items-center">
                <a href="Profile.html" class="user-avatar text-decoration-none">JD</a>
            </div>
        </div>
    </nav>

    <div class="app-container">

        <!-- SIDEBAR -->
        <aside class="app-sidebar">
            <nav class="nav flex-column">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="StudentDashboard.html">Dashboard</a>
                <a class="nav-link" href="MyCourses.html">My Courses</a>
                <a class="nav-link" href="Materials.html">Materials</a>
                <a class="nav-link" href="Evaluate.html">Grade Tracker</a>
                <a class="nav-link active" href="Calendar.html">Calendar</a>
            </nav>
        </aside>

        <!-- MAIN -->
        <main class="app-main">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 id="calendarTitle">Calendar</h2>

                <!-- VIEW SWITCH -->
                <div>
                    <button class="btn btn-outline-primary me-2" onclick="changeView('dayGridMonth')">Monthly</button>
                    <button class="btn btn-outline-primary" onclick="changeView('timeGridWeek')">Weekly</button>
                </div>
            </div>

            <!-- CALENDAR -->
            <div id="calendar"></div>

        </main>
    </div>

    <!-- SCRIPT -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            // =========================
            // GET COURSE FROM URL
            // =========================
            const params = new URLSearchParams(window.location.search);
            const courseName = params.get("course");

            const titleEl = document.getElementById("calendarTitle");

            if (courseName) {
                titleEl.innerText = `${courseName} Calendar`;
            } else {
                titleEl.innerText = "All Courses Calendar";
            }

            // =========================
            // SYLLABUS DATA
            // =========================
            const allAssessments = {
                "Intro to Programming": [
                    { title: "Quiz 1", date: "2026-02-24", weight: 10 },
                    { title: "Quiz 2", date: "2026-03-10", weight: 10 },
                    { title: "Midterm Exam", date: "2026-03-25", weight: 25 },
                    { title: "Homework", date: "2026-04-05", weight: 10 },
                    { title: "Project", date: "2026-04-20", weight: 15 },
                    { title: "Final Exam", date: "2026-05-15", weight: 30 }
                ],
                "Calculus II": [
                    { title: "Quiz", date: "2026-02-24", weight: 15 },
                    { title: "Midterm", date: "2026-03-20", weight: 35 },
                    { title: "Final Exam", date: "2026-05-10", weight: 50 }
                ]
            };

            // =========================
            // BUILD EVENTS
            // =========================
            let events = [];

            // Add hardcoded syllabus data
            if (courseName && allAssessments[courseName]) {
                events = allAssessments[courseName].map(item => ({
                    title: `${item.title} (${item.weight}%)`,
                    start: item.date
                }));
            } else {
                Object.keys(allAssessments).forEach(course => {
                    allAssessments[course].forEach(item => {
                        events.push({
                            title: `${course}: ${item.title} (${item.weight}%)`,
                            start: item.date
                        });
                    });
                });
            }

            // =========================
            // LOAD INSTRUCTOR EVENTS
            // =========================
            const instructorEvents = JSON.parse(localStorage.getItem('courseLinkEvents')) || [];
            instructorEvents.forEach(evt => {
                // Only show published events for the student, or specific course
                if (evt.extendedProps && evt.extendedProps.published) {
                    if (!courseName || evt.title.includes(courseName)) {
                        events.push(evt);
                    }
                }
            });

            // =========================
            // INIT CALENDAR
            // =========================
            const calendarEl = document.getElementById("calendar");

            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: "dayGridMonth",

                headerToolbar: {
                    left: "prev,next today",
                    center: "title",
                    right: ""
                },

                events: events,

                eventClick: function (info) {
                    alert(info.event.title);
                },

                height: "auto"
            });

            calendar.render();

            // =========================
            // SWITCH VIEW FUNCTION
            // =========================
            window.changeView = function (viewName) {
                calendar.changeView(viewName);
            };

        });
    </script>
    <script src="js/current_user.js"></script>

</body>

</html>
