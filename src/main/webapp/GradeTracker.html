<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Detail — CourseLink</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="css/home.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg app-navbar sticky-top bg-white">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="Images/web-logo.png" alt="CourseLink" width="38" height="34" class="me-2">
                <span class="fw-bold">CourseLink</span>
            </a>
            <div class="ms-auto d-flex align-items-center">
                <span class="me-3 text-muted">Welcome, Student</span>
                <a href="Profile.html" class="user-avatar text-decoration-none">JD</a>
            </div>
        </div>
    </nav>

    <div class="app-container">
        <aside class="app-sidebar">
            <nav class="nav flex-column">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="StudentDashboard.html">Dashboard</a>
                <a class="nav-link" href="MyCourses.html" id="nav-my-courses">My Courses</a>
                <a class="nav-link" href="Materials.html">Materials</a>
                <a class="nav-link active" href="Evaluate.html">Grade Tracker</a>
                <a class="nav-link" href="Calendar.html">Calendar</a>
            </nav>
        </aside>

        <main class="app-main">
            <h2 id="courseTitle"></h2>

            <!-- TARGET GRADE -->
            <div class="mb-3">
                <label>Select Target Grade</label>
                <select id="targetGrade" class="form-select">
                    <option value="90">A</option>
                    <option value="80">B</option>
                    <option value="70">C</option>
                    <option value="60">D</option>
                </select>
            </div>

            <!-- TABLE -->
            <table class="table">
                <thead>
                    <tr>
                        <th>Assessment</th>
                        <th>Weight (%)</th>
                        <th>Your Grade (%)</th>
                    </tr>
                </thead>
                <tbody id="gradeTable"></tbody>
            </table>

            <!-- RESULTS -->
            <div class="mt-4">
                <p>Current Average: <strong id="currentAvg">0%</strong></p>
                <p>Max Achievable: <strong id="maxGrade">0%</strong></p>
                <p>Needed on remaining work: <strong id="remaining">0%</strong> to get <strong id="targetGradeLetter">A</strong></p>
            </div>

            <!-- PROGRESS BAR -->
            <div class="progress mt-3">
                <div id="progressBar" class="progress-bar" style="width: 0%"></div>
            </div>
        </main>
    </div>
    
    <script src="js/current_user.js"></script>
    <script src="js/gradetracker.js"></script>
</body>
