<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Instructor Calendar — CourseLink</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Images/web-icon.png" type="image/png">

    <!-- Fonts + Bootstrap -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FullCalendar -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>

    <!-- Your CSS -->
    <link href="css/home.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg app-navbar sticky-top bg-white">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="Images/web-logo.png" alt="CourseLink" width="38" height="34" class="me-2">
                <span class="fw-bold">CourseLink</span>
            </a>
            <div class="ms-auto d-flex align-items-center">
                <span class="me-3 text-muted d-none d-md-block">Welcome, Instructor</span>
                <a href="Profile.html" class="user-avatar text-decoration-none">IN</a>
            </div>
        </div>
    </nav>

    <div class="app-container">
        <aside class="app-sidebar">
            <nav class="nav flex-column">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="InstructorDashboard.html">Dashboard</a>
                <a class="nav-link" href="InstructorCourses.html">Manage Courses</a>
                <a class="nav-link" href="InstructorSyllabus.html">Edit Syllabus</a>
                <a class="nav-link" href="InstructorMaterials.html">Upload Materials</a>
                <a class="nav-link active" href="InstructorCalendar.html">Exam Calendar</a>
            </nav>
        </aside>

        <main class="app-main">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Instructor Exam Calendar</h2>
                <div class="d-flex gap-2">
                    <button class="btn btn-primary rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#addEventModal">+ Add Exam/Quiz</button>
                    <button class="btn btn-outline-primary" onclick="calendar.changeView('dayGridMonth')">Monthly</button>
                    <button class="btn btn-outline-primary" onclick="calendar.changeView('timeGridWeek')">Weekly</button>
                </div>
            </div>

            <div class="feature-card p-4 shadow-sm">
                <div id="calendar"></div>
            </div>
        </main>
    </div>

    <!-- Modal for adding event -->
    <div class="modal fade" id="addEventModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold">Schedule New Assessment</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="addEventForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Course</label>
                            <select class="form-select" id="eventCourse">
                                <option value="">Loading courses...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Exam/Quiz Name</label>
                            <input type="text" class="form-control" id="eventTitle" placeholder="e.g. Midterm 1" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold">Date</label>
                                <input type="date" class="form-control" id="eventDate" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold">Weight (%)</label>
                                <input type="number" class="form-control" id="eventWeight" placeholder="e.g. 15" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Topic Covered</label>
                            <input type="text" class="form-control" id="eventTopic" placeholder="e.g. Differentiation" required>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="publishToStudents" checked>
                            <label class="form-check-label small" for="publishToStudents">Publish to student calendars</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mt-2 py-2">Add to Calendar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let calendar;
        let courseById = {};

        document.addEventListener("DOMContentLoaded", function () {
            const calendarEl = document.getElementById("calendar");

            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: "dayGridMonth",
                headerToolbar: {
                    left: "prev,next today",
                    center: "title",
                    right: ""
                },
                events: [],
                height: "auto"
            });

            window.calendar = calendar;
            calendar.render();

            loadCourses().then(loadEvents);
            setupEventForm();
        });

        function loadCourses() {
            return fetch('CourseServlet')
                .then(response => response.json())
                .then(courses => {
                    const select = document.getElementById('eventCourse');
                    select.innerHTML = '';
                    courseById = {};

                    if (!courses.length) {
                        const option = document.createElement('option');
                        option.value = '';
                        option.textContent = 'Create a course first';
                        select.appendChild(option);
                        select.disabled = true;
                        return;
                    }

                    select.disabled = false;
                    courses.forEach(course => {
                        courseById[String(course.id)] = course;
                        const option = document.createElement('option');
                        option.value = course.id;
                        option.textContent = `${course.name} (#${course.id})`;
                        select.appendChild(option);
                    });
                })
                .catch(error => {
                    console.error('Course Load Error:', error);
                });
        }

        function loadEvents() {
            fetch('AssessmentServlet')
                .then(response => response.json())
                .then(assessments => {
                    calendar.removeAllEvents();
                    assessments.forEach(assessment => {
                        const course = courseById[String(assessment.courseId)];
                        const courseName = course ? course.name : `Course #${assessment.courseId}`;
                        calendar.addEvent({
                            title: `${courseName}: ${assessment.title} (${assessment.weightPercent}%)`,
                            start: assessment.date,
                            color: assessment.type === 'Quiz' ? '#ed8936' : '#1a365d',
                            extendedProps: {
                                topic: assessment.topic || '',
                                published: assessment.published
                            }
                        });
                    });
                })
                .catch(error => {
                    console.error('Assessment Load Error:', error);
                    alert('Could not load calendar events.');
                });
        }

        function setupEventForm() {
            document.getElementById('addEventForm').addEventListener('submit', function(e) {
                e.preventDefault();

                const params = new URLSearchParams();
                const title = document.getElementById('eventTitle').value.trim();
                const lowerTitle = title.toLowerCase();

                params.append('courseId', document.getElementById('eventCourse').value);
                params.append('title', title);
                params.append('type', lowerTitle.includes('quiz') ? 'Quiz' : 'Exam');
                params.append('weight', document.getElementById('eventWeight').value);
                params.append('date', document.getElementById('eventDate').value);
                params.append('topic', document.getElementById('eventTopic').value.trim());
                params.append('published', document.getElementById('publishToStudents').checked);

                fetch('api/add-exam', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params.toString()
                })
                .then(response => response.json())
                .then(data => {
                    if (!data.success) {
                        throw new Error('Assessment could not be saved.');
                    }

                    bootstrap.Modal.getInstance(document.getElementById('addEventModal')).hide();
                    this.reset();
                    loadEvents();
                })
                .catch(error => {
                    console.error('Assessment Save Error:', error);
                    alert('Could not save the assessment.');
                });
            });
        }
    </script>
    <script src="js/current_user.js"></script>
</body>
</html>
